<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Directory</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

background:#171d2d;
color:#fff;
padding:18px;

}

.topbar{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;

}

.search{

position:relative;
width:600px;
max-width:100%;

}

.search input{

width:100%;
padding:12px 45px;
background:#23293b;
border:1px solid #00d2c6;
outline:none;
color:white;
border-radius:4px;
font-size:15px;

}

.search i{

position:absolute;
left:15px;
top:13px;
color:#a5a5a5;

}

.right{

display:flex;
align-items:center;
gap:15px;

}

.page{

color:#ddd;
font-size:20px;

}

.icon-group{

display:flex;
background:#23293b;
border-radius:4px;
overflow:hidden;

}

.icon{

padding:12px 16px;
cursor:pointer;
border-left:1px solid #2f3650;
color:#cfcfcf;
transition:.3s;

}

.icon:first-child{

border:none;

}

.icon:hover,
.active{

background:#00d2c6;
color:#fff;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(480px,1fr));
gap:18px;

}

.card{

background:#23293b;
border:1px solid #31394d;
display:flex;
position:relative;
transition:.3s;
overflow:hidden;

}

.card:hover{

transform:translateY(-3px);
border-color:#00d2c6;
box-shadow:0 5px 15px rgba(0,0,0,.4);

}

.photo{

width:130px;
height:180px;
overflow:hidden;
flex-shrink:0;

}

.photo img{

width:100%;
height:100%;
object-fit:cover;

}

.info{

padding:15px;
flex:1;

}

.name{

font-size:30px;
font-weight:600;
margin-bottom:8px;

}

.job{

font-size:21px;
color:#ddd;
margin-bottom:12px;

}

.detail{

display:flex;
align-items:center;
margin:8px 0;
font-size:18px;
color:#ddd;

}

.detail i{

width:25px;
color:#ff76c8;

}

.badges{

margin-top:15px;

}

.badge{

display:inline-block;
padding:5px 12px;
font-size:14px;
border-radius:15px;
margin-right:8px;

}

.blue{

background:#2e6777;

}

.orange{

background:#7c5c49;

}

.time{

position:absolute;
right:15px;
bottom:15px;
color:#888;
font-size:18px;

}

.dot{

position:absolute;
top:12px;
right:12px;
width:14px;
height:14px;
background:#8c8c8c;
border-radius:50%;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.card{

flex-direction:column;

}

.photo{

width:100%;
height:250px;

}

.name{

font-size:24px;

}

.job{

font-size:18px;

}

}

</style>

</head>
<body>

<div class="topbar">

<div class="search">

<i class="fa fa-search"></i>

<input type="text" id="search" placeholder="Search Employee...">

</div>

<div class="right">

<div class="page">
1-3 / 3
</div>

<div class="icon-group">

<div class="icon"><i class="fa fa-chevron-left"></i></div>
<div class="icon"><i class="fa fa-chevron-right"></i></div>
<div class="icon active"><i class="fa fa-table-cells-large"></i></div>
<div class="icon"><i class="fa fa-list"></i></div>
<div class="icon"><i class="fa fa-sitemap"></i></div>
<div class="icon"><i class="fa fa-clock"></i></div>
<div class="icon"><i class="fa fa-chart-area"></i></div>

</div>

</div>

</div>

<div class="grid" id="employees">

<div class="card">

<div class="badges">

<script>

const search=document.getElementById("search");

search.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

let text=card.innerText.toLowerCase();

card.style.display=text.includes(value)?"flex":"none";

});

});

</script>

</body>
</html>
